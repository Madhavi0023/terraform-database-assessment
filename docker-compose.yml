services:
  postgres:
    image: postgres:16

    container_name: postgres

    restart: always

    environment:
      POSTGRES_DB: hotel_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/seed/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - ./database/indexes/indexes.sql:/docker-entrypoint-initdb.d/03-indexes.sql

volumes:
  postgres_data:
